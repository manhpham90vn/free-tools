# =============================================================================
# Free Antigravity - MITM Proxy Configuration
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# TARGET PROVIDER
# Which LLM provider to forward requests to
# Options: claude, openai, gemini, ollama
# ─────────────────────────────────────────────────────────────────────────────
target_provider: claude

# Default model when no mapping is found
default_model: "claude-sonnet-4-6"

# ─────────────────────────────────────────────────────────────────────────────
# MODEL MAPPING
# Map source model names to target model names
# Format: "source_model": "target_model"
# ─────────────────────────────────────────────────────────────────────────────
model_mapping:
  # Gemini models → Claude
  gemini-2.5-pro: claude-opus-4-6
  gemini-2.5-flash-thinking: claude-sonnet-4-6
  gemini-2.5-flash: claude-sonnet-4-6
  gemini-2.5-flash-lite: claude-haiku-3-5
  gemini-2.0-flash: claude-sonnet-4-6

  # Claude models → Claude
  claude-opus-4-6-thinking: claude-opus-4-6
  claude-sonnet-4-6: claude-sonnet-4-6

  # OpenAI models → Claude
  gpt-4o: claude-sonnet-4-6
  gpt-4o-mini: claude-haiku-3-5

# ─────────────────────────────────────────────────────────────────────────────
# NETWORK
# Traffic interception settings
# ─────────────────────────────────────────────────────────────────────────────

# Hostnames to intercept (DNS spoofed to 127.0.0.1)
hosts:
  - daily-cloudcode-pa.googleapis.com
  - cloudcode-pa.googleapis.com

# Port for MITM server to listen on (default: 443)
listen_port: 443

# ─────────────────────────────────────────────────────────────────────────────
# CERTIFICATES
# SSL/TLS certificate storage
# ─────────────────────────────────────────────────────────────────────────────

# Directory to store Root CA and generated certificates
cert_dir: "~/.free-antigravity"
