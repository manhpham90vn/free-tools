# Configuration for Antigravity MITM Proxy

# Custom endpoint to forward requests to.
# Can also be set via ANTHROPIC_BASE_URL env var.
# target_endpoint: "https://api.anthropic.com/v1/messages"

# API key for the custom endpoint.
# Can also be set via ANTHROPIC_AUTH_TOKEN env var.
# api_key: "sk-ant-xxx"

# Hosts to intercept (will be mapped to 127.0.0.1 in /etc/hosts)
hosts:
  - daily-cloudcode-pa.googleapis.com
  - cloudcode-pa.googleapis.com

# Model name mapping: original Gemini model -> target Anthropic model
model_mapping:
  gemini-3.1-pro-high: claude-opus-4-6
  gemini-3.1-pro-low: claude-opus-4-6
  gemini-3-pro-high: claude-opus-4-6
  gemini-3-pro-low: claude-opus-4-6
  gemini-3-flash: claude-opus-4-6
  gemini-3-flash-agent: claude-opus-4-6
  gemini-2.5-flash: claude-opus-4-6
  gemini-2.5-flash-lite: claude-opus-4-6
  gemini-2.5-flash-thinking: claude-opus-4-6
  gemini-2.5-pro: claude-opus-4-6
  claude-opus-4-6-thinking: claude-opus-4-6
  claude-sonnet-4-6: claude-opus-4-6
  gpt-oss-120b-medium: claude-opus-4-6

# Default model when no mapping found
default_model: claude-opus-4-6

# Port configuration
listen_port: 443

# Certificate directory
cert_dir: "~/.free-antigravity"
